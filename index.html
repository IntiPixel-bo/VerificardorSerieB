<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>ValidaSerie BCB</title>

    <script async src="https://docs.opencv.org/4.10.0/opencv.js"></script>
    <script src="https://unpkg.com/tesseract.js@4.1.1/dist/tesseract.min.js"></script>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#fff;font-family:system-ui,sans-serif;padding:10px;display:flex;justify-content:center;}
        .container{max-width:600px;width:100%;background:rgba(255,255,255,0.95);border-radius:20px;padding:20px;color:#333;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
        h1{text-align:center;color:#2c3e50;}
        .subtitle{text-align:center;color:#7f8c8d;font-size:0.9rem;margin:5px 0 15px;}
        .denomination-selector{display:flex;gap:10px;justify-content:center;margin-bottom:15px;flex-wrap:wrap;}
        .denom-btn{padding:12px 20px;border:3px solid #e0e0e0;background:white;border-radius:12px;font-weight:bold;cursor:pointer;}
        .denom-btn.active{border-color:#667eea;background:#667eea;color:white;transform:scale(1.05);}
        .camera-section{position:relative;width:100%;background:#000;border-radius:15px;overflow:hidden;margin-bottom:15px;aspect-ratio:4/3;}
        #video{width:100%;height:100%;object-fit:cover;display:none;}
        .camera-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(#1a1a2e,#16213e);color:white;}
        .controls{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap;}
        button{padding:12px 20px;border:none;border-radius:12px;font-size:1rem;cursor:pointer;}
        #startBtn{background:#27ae60;color:white;}
        #captureBtn{background:#e67e22;color:white;}
        #stopBtn{background:#e74c3c;color:white;}
        .manual-box{background:#ecf0f1;padding:15px;border-radius:12px;margin:15px 0;}
        .bottom-section{display:flex;gap:15px;margin-top:10px;}
        .ranges-column{flex:1;background:#fff3cd;border:1px solid #ffeaa7;border-radius:10px;padding:10px;color:#856404;}
        .support-column{width:140px;background:#f8f9fa;border:2px dashed #667eea;border-radius:10px;padding:10px;display:flex;flex-direction:column;align-items:center;}
        .support-column img{width:100%;border-radius:8px;}
        .footer{text-align:center;font-size:0.75rem;color:#7f8c8d;margin-top:20px;}
        #alertOverlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999;}
        .alert-box{background:#e74c3c;color:white;padding:30px;border-radius:20px;text-align:center;max-width:90%;}
    </style>
</head>
<body>
<div class="container">
    <h1>ValidaSerie BCB</h1>
    <p class="subtitle">Detecta billetes inhabilitados Serie B (oficial BCB 2026)</p>

    <!-- CÁMARA -->
    <div class="camera-section">
        <video id="video" autoplay playsinline></video>
        <div class="camera-placeholder" id="placeholder">
            <div style="font-size:4rem;">📷</div>
            <button id="startBtn" onclick="startCamera()" style="margin-top:15px;padding:12px 25px;background:#27ae60;color:white;border:none;border-radius:25px;">Iniciar Cámara</button>
        </div>
    </div>

    <div class="controls">
        <button id="captureBtn" style="display:none;" onclick="captureAndScan()">📸 Capturar y Validar</button>
        <button id="stopBtn" style="display:none;" onclick="stopCamera()">⏹ Detener</button>
        <button id="torchBtn" style="display:none;" onclick="toggleTorch()">🔦 Linterna</button>
    </div>
    <div class="denomination-selector">
        <button class="denom-btn active" data-value="10">Bs 10</button>
        <button class="denom-btn" data-value="20">Bs 20</button>
        <button class="denom-btn" data-value="50">Bs 50</button>
    </div>
    <!-- VERIFICACIÓN MANUAL -->
    <div class="manual-box">
        <label style="font-weight:bold;display:block;margin-bottom:8px;">Verificación Manual (Serie B)</label>
        <input type="text" id="manualInput" placeholder="Ej: 77100001" style="width:100%;padding:14px;border-radius:8px;border:2px solid #bdc3c7;font-size:1.2rem;text-align:center;text-transform:uppercase;" maxlength="12">
        <button onclick="checkManual()" style="width:100%;padding:14px;background:#8e44ad;color:white;border:none;border-radius:12px;margin-top:8px;">Validar Manualmente</button>
    </div>

    <!-- CORTES + QR (AHORA ABAJO) -->
    <div class="bottom-section">
        <div class="ranges-column">
            <h3 style="text-align:center;">📋 Rangos Inválidos Bs <span id="currentDenom">10</span></h3>
            <div id="rangeList" style="font-family:monospace;font-size:0.75rem;max-height:160px;overflow-y:auto;"></div>
        </div>
        <div class="support-column">
            <div style="font-weight:bold;color:#667eea;margin-bottom:8px;">Apoyo Voluntario</div>
            <img src="qrapoyo.jpg" alt="QR Apoyo">
        </div>
    </div>

    <div class="footer">IntiPixel-bo WhatsApp +591 72211111</div>
</div>

<div id="resultsContainer"></div>
<div id="statsBar" style="display:none;background:#34495e;color:white;padding:12px;border-radius:8px;margin:15px 0;text-align:center;"></div>
<button id="clearBtn" onclick="clearResults()" style="display:none;width:100%;padding:12px;background:#95a5a6;color:white;border:none;border-radius:12px;">🗑 Limpiar Resultados</button>

<!-- ALERT -->
<div id="alertOverlay">
    <div class="alert-box">
        <h2>¡BILLETE INVÁLIDO!</h2>
        <div id="alertSerial" style="font-size:2rem;font-family:monospace;margin:15px 0;"></div>
        <button onclick="closeAlert()" style="padding:12px 30px;background:white;color:#e74c3c;border:none;border-radius:25px;font-weight:bold;">Entendido</button>
    </div>
</div>

<script src="ranges.js"></script>
<script src="app.js"></script>
</body>
</html>
